experiment:
  name: fednova_mnist_adaptive_dp_topk_debug
  seed: 42
  output_root: outputs

dataset:
  name: mnist
  root: data
  partition_mode: dirichlet
  num_clients: 5
  dirichlet_alpha: 0.5
  download: false
  num_classes: 10
  max_train_samples: 5000
  max_test_samples: 1000

model:
  name: mnist_cnn

training:
  algorithm: fednova
  rounds: 3
  local_epochs: 1
  batch_size: 64
  eval_batch_size: 256
  learning_rate: 0.01
  fraction_fit: 0.6
  proximal_mu: 0.0

privacy:
  dp_mode: adaptive
  epsilon: null
  target_epsilon: 5.0
  delta: 1.0e-5
  clip_norm: 1.0
  noise_multiplier: 0.2
  noise_schedule: metric_based
  min_noise_multiplier: 0.2
  max_noise_multiplier: 0.8
  schedule_metric: update_norm
  schedule_warmup_rounds: 1

compression:
  mode: topk
  topk_ratio: 0.2
  compress_updates: true

runtime:
  device: auto
  num_workers: 0
