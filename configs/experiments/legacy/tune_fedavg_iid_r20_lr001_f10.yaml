experiment:
  name: tune_fedavg_iid_r20_lr001_f10
  seed: 42
  output_root: outputs

dataset:
  name: mnist
  root: data
  partition_mode: iid
  num_clients: 10
  dirichlet_alpha: 0.1
  download: false
  num_classes: 10
  max_train_samples: 10000
  max_test_samples: 2000

model:
  name: mnist_cnn

training:
  algorithm: fedavg
  rounds: 20
  local_epochs: 1
  batch_size: 64
  eval_batch_size: 256
  learning_rate: 0.01
  fraction_fit: 1.0
  proximal_mu: 0.0

privacy:
  dp_mode: none
  epsilon: null
  noise_schedule: none

compression:
  mode: none
  topk_ratio: 1.0

runtime:
  device: auto
  num_workers: 0

