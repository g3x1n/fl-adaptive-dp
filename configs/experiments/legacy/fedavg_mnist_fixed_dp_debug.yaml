experiment:
  name: fedavg_mnist_fixed_dp_debug
  seed: 42
  output_root: outputs

dataset:
  name: mnist
  root: data
  partition_mode: dirichlet
  num_clients: 5
  dirichlet_alpha: 0.5
  download: false
  num_classes: 10
  max_train_samples: 5000
  max_test_samples: 1000

model:
  name: mnist_cnn

training:
  algorithm: fedavg
  rounds: 2
  local_epochs: 1
  batch_size: 64
  eval_batch_size: 256
  learning_rate: 0.01
  fraction_fit: 0.6
  proximal_mu: 0.0

privacy:
  dp_mode: fixed
  epsilon: 10.0
  delta: 1.0e-5
  clip_norm: 1.0
  noise_multiplier: 0.4
  noise_schedule: none

compression:
  mode: none
  topk_ratio: 1.0
  compress_updates: true

runtime:
  device: auto
  num_workers: 0
