experiment:
  name: fednova_mnist_noniid_best
  seed: 42
  output_root: outputs

dataset:
  name: mnist
  root: data
  partition_mode: dirichlet
  num_clients: 10
  dirichlet_alpha: 0.1
  download: false
  num_classes: 10
  max_train_samples: 10000
  max_test_samples: 2000

model:
  name: mnist_cnn

training:
  algorithm: fednova
  rounds: 20
  # 当前调参中最优的工作点：大学习率配合 FedNova 的归一化聚合表现最好。
  local_epochs: 1
  batch_size: 64
  eval_batch_size: 256
  learning_rate: 0.05
  fraction_fit: 1.0
  proximal_mu: 0.0

privacy:
  dp_mode: none
  epsilon: null
  noise_schedule: none

compression:
  mode: none
  topk_ratio: 1.0

runtime:
  device: auto
  num_workers: 0
